<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AuthDashboard</title>
  <meta name="description" content="Sign in to your AuthDashboard account." />

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/notification.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/loader.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/utilities.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer" class="notification-container" aria-live="polite" aria-atomic="false"></div>

  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__brand" aria-label="AuthDashboard Home">
          <img src="assets/images/logo.svg" alt="" class="navbar__logo" width="32" height="32" />
          AuthDashboard
        </a>
        <div class="navbar__links">
          <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
          <a href="dashboard.html" class="navbar__link" data-page="dashboard.html" data-auth-visible style="display:none;">Dashboard</a>
          <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible style="display:none;">Profile</a>
          <a href="login.html" class="navbar__link navbar__link--active" data-page="login.html" data-unauth-visible>Login</a>
          <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
        </div>
        <div class="navbar__actions">
          <div class="navbar__user" data-auth-visible style="display:none;">
            <img src="assets/icons/user-avatar.svg" alt="User avatar" class="navbar__avatar" width="32" height="32" />
            <span class="navbar__user-name">User</span>
          </div>
          <button class="btn btn-sm btn-ghost navbar__logout-btn" data-auth-visible style="display:none;">Logout</button>
          <a href="login.html" class="btn btn-sm btn-primary" data-unauth-visible>Login</a>
        </div>
        <button class="navbar__toggle" aria-label="Toggle navigation menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="navbar__mobile-menu" aria-hidden="true">
        <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
        <a href="dashboard.html" class="navbar__link" data-page="dashboard.html" data-auth-visible style="display:none;">Dashboard</a>
        <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible style="display:none;">Profile</a>
        <a href="login.html" class="navbar__link navbar__link--active" data-page="login.html" data-unauth-visible>Login</a>
        <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
        <div class="navbar__actions">
          <button class="btn btn-block btn-ghost navbar__logout-btn" data-auth-visible style="display:none;">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Main Content: Auth Page -->
    <main class="page-content auth-page">
      <div class="auth-card">
        <div class="auth-card__header">
          <h1 class="auth-card__title">Welcome back</h1>
          <p class="auth-card__subtitle">Sign in to your account to continue.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-card__form" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Email address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="password-toggle" aria-label="Toggle password visibility" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-card__forgot">
            <a href="forgot-password.html">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <!-- Divider -->
        <div class="auth-card__divider">or</div>

        <!-- Google Sign-In -->
        <button type="button" class="btn btn-google btn-block">
          <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>

        <p class="auth-card__footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
      <div class="footer__inner">
        <span class="footer__copyright">&copy; 2026 AuthDashboard. All rights reserved.</span>
        <nav class="footer__links" aria-label="Footer links">
          <a href="index.html" class="footer__link">Home</a>
          <a href="#" class="footer__link">Privacy</a>
          <a href="#" class="footer__link">Terms</a>
        </nav>
      </div>
    </footer>
  </div>

  <!-- App JS -->
  <script type="module" src="js/app.js"></script>
</body>
</html>

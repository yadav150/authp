<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - AuthDashboard</title>
  <meta name="description" content="Your personal dashboard." />

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/notification.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/loader.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/utilities.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer" class="notification-container" aria-live="polite" aria-atomic="false"></div>

  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__brand" aria-label="AuthDashboard Home">
          <img src="assets/images/logo.svg" alt="" class="navbar__logo" width="32" height="32" />
          AuthDashboard
        </a>
        <div class="navbar__links">
          <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
          <a href="dashboard.html" class="navbar__link navbar__link--active" data-page="dashboard.html" data-auth-visible>Dashboard</a>
          <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible>Profile</a>
          <a href="login.html" class="navbar__link" data-page="login.html" data-unauth-visible>Login</a>
          <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
        </div>
        <div class="navbar__actions">
          <div class="navbar__user" data-auth-visible>
            <img src="assets/icons/user-avatar.svg" alt="User avatar" class="navbar__avatar" width="32" height="32" />
            <span class="navbar__user-name">User</span>
          </div>
          <button class="btn btn-sm btn-ghost navbar__logout-btn" data-auth-visible>Logout</button>
          <a href="login.html" class="btn btn-sm btn-primary" data-unauth-visible>Login</a>
        </div>
        <button class="navbar__toggle" aria-label="Toggle navigation menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="navbar__mobile-menu" aria-hidden="true">
        <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
        <a href="dashboard.html" class="navbar__link navbar__link--active" data-page="dashboard.html" data-auth-visible>Dashboard</a>
        <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible>Profile</a>
        <a href="login.html" class="navbar__link" data-page="login.html" data-unauth-visible>Login</a>
        <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
        <div class="navbar__actions">
          <button class="btn btn-block btn-ghost navbar__logout-btn" data-auth-visible>Logout</button>
        </div>
      </div>
    </nav>

    <!-- Main Content: Dashboard -->
    <main class="page-content dashboard">
      <div class="container">
        <!-- Header with greeting -->
        <div class="dashboard__header">
          <div>
            <h1 class="dashboard__greeting" id="dashboardGreeting">Hello, <span>User</span></h1>
            <p class="dashboard__date" id="dashboardDate"></p>
          </div>
          <div class="quick-actions">
            <a href="profile.html" class="btn btn-outline btn-sm">Edit Profile</a>
          </div>
        </div>

        <!-- Stat Cards -->
        <div class="dashboard__stats">
          <div class="stat-card">
            <div class="stat-card__value" id="statCreated">-</div>
            <div class="stat-card__label">Member Since</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="statLastSignIn">-</div>
            <div class="stat-card__label">Last Sign-In</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="statVerified">-</div>
            <div class="stat-card__label">Email Verified</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="statProvider">-</div>
            <div class="stat-card__label">Sign-In Method</div>
          </div>
        </div>

        <!-- Recent Activity -->
        <section class="dashboard__section">
          <h2 class="dashboard__section-title">Recent Activity</h2>
          <div class="activity-list" id="activityList">
            <!-- Populated by dashboard.js -->
          </div>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
      <div class="footer__inner">
        <span class="footer__copyright">&copy; 2026 AuthDashboard. All rights reserved.</span>
        <nav class="footer__links" aria-label="Footer links">
          <a href="index.html" class="footer__link">Home</a>
          <a href="#" class="footer__link">Privacy</a>
          <a href="#" class="footer__link">Terms</a>
        </nav>
      </div>
    </footer>
  </div>

  <!-- App JS (global init, auth guard) -->
  <script type="module" src="js/app.js"></script>
  <!-- Dashboard-specific logic -->
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>

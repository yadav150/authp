<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password · Yadav Authentication Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">Yadav Auth</a>
    </div>
  </header>

  <main id="main-content">
    <section class="auth-section">
      <div class="auth-container">
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle">Enter a new password for your account.</p>
        <form id="reset-form" novalidate>
          <div class="form-group password-group">
            <label for="new-password">New Password</label>
            <div class="input-wrapper">
              <input type="password" id="new-password" name="newPassword" minlength="6" required />
              <button type="button" class="password-toggle" aria-label="Show password">
                <svg viewBox="0 0 24 24" class="eye-off" style="width:20px;height:20px;stroke:var(--primary-color);fill:none;stroke-width:2;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg viewBox="0 0 24 24" class="eye-on" style="width:20px;height:20px;stroke:var(--primary-color);fill:none;stroke-width:2; display:none;">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="error-msg">Password must be at least 6 characters.</span>
          </div>
          <div class="form-group password-group">
            <label for="confirm-password">Confirm New Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirm-password" name="confirm" required />
              <button type="button" class="password-toggle" aria-label="Show password">
                <svg viewBox="0 0 24 24" class="eye-off" style="width:20px;height:20px;stroke:var(--primary-color);fill:none;stroke-width:2;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg viewBox="0 0 24 24" class="eye-on" style="width:20px;height:20px;stroke:var(--primary-color);fill:none;stroke-width:2; display:none;">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="error-msg">Passwords do not match.</span>
          </div>
          <button type="submit" class="btn">Reset Password</button>
        </form>
        <div id="reset-status" class="status-message"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="auth.html">Auth</a>
        <a href="legal/about.html">About</a>
      </div>
      <p class="footer-copy">&copy; 2026 Yadav Authentication Project. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="reset-password.js"></script>
</body>
</html>

<!-- ============================================================
     Navbar – Reusable Navigation Bar Component
     Include on every page. Dynamic auth state via navbar.js.
     ============================================================ -->

<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="navbar__inner">

    <!-- Brand / Logo -->
    <a href="index.html" class="navbar__brand" aria-label="AuthDashboard Home">
      <img src="assets/images/logo.svg" alt="" class="navbar__logo" width="32" height="32" />
      AuthDashboard
    </a>

    <!-- Desktop Links -->
    <div class="navbar__links">
      <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
      <!-- Links visible only when authenticated -->
      <a href="dashboard.html" class="navbar__link" data-page="dashboard.html" data-auth-visible style="display:none;">Dashboard</a>
      <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible style="display:none;">Profile</a>
      <!-- Links visible only when NOT authenticated -->
      <a href="login.html" class="navbar__link" data-page="login.html" data-unauth-visible>Login</a>
      <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
    </div>

    <!-- Desktop Actions (Right) -->
    <div class="navbar__actions">
      <!-- User info when logged in -->
      <div class="navbar__user" data-auth-visible style="display:none;">
        <img src="assets/icons/user-avatar.svg" alt="User avatar" class="navbar__avatar" width="32" height="32" />
        <span class="navbar__user-name">User</span>
      </div>
      <!-- Logout button when logged in -->
      <button class="btn btn-sm btn-ghost navbar__logout-btn" data-auth-visible style="display:none;">Logout</button>
      <!-- Login/Signup when NOT logged in -->
      <a href="login.html" class="btn btn-sm btn-primary navbar__login-btn" data-unauth-visible>Login</a>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button class="navbar__toggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu (hidden by default) -->
  <div class="navbar__mobile-menu" aria-hidden="true">
    <a href="index.html" class="navbar__link" data-page="index.html">Home</a>
    <a href="dashboard.html" class="navbar__link" data-page="dashboard.html" data-auth-visible style="display:none;">Dashboard</a>
    <a href="profile.html" class="navbar__link" data-page="profile.html" data-auth-visible style="display:none;">Profile</a>
    <a href="login.html" class="navbar__link" data-page="login.html" data-unauth-visible>Login</a>
    <a href="signup.html" class="navbar__link" data-page="signup.html" data-unauth-visible>Sign Up</a>
    <div class="navbar__actions">
      <button class="btn btn-block btn-ghost navbar__logout-btn" data-auth-visible style="display:none;">Logout</button>
    </div>
  </div>
</nav>
